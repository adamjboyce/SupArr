# =============================================================================
# Recyclarr — TRaSH Guides 4K UHD Quality Profiles
# =============================================================================
# Auto-deployed by init script. API keys are substituted from .env.
# Manual edit: /opt/arr-stack/recyclarr/config/recyclarr.yml
# Sync: docker exec recyclarr recyclarr sync
# =============================================================================

sonarr:
  series:
    base_url: http://sonarr:8989
    api_key: YOUR_SONARR_API_KEY

    quality_definition:
      type: series

    quality_profiles:
      - name: WEB-2160p
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: WEB 2160p
          until_score: 10000
        min_format_score: 0
        quality_sort: top
        qualities:
          - name: WEB 2160p
            qualities:
              - WEBDL-2160p
              - WEBRip-2160p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
          - name: HDTV-2160p
          - name: HDTV-1080p
          - name: WEB 720p
            qualities:
              - WEBDL-720p
              - WEBRip-720p

    custom_formats:
      # Streaming services
      - trash_ids:
          - d660701077794679fd59e8bdf4ce3a29  # AMZN
          - f67c9ca88f463a48346062e8ad07713f  # ATVP
          - 36b72f59f4ea20aad9316f475f2d9fbb  # DCU
          - 89358767a60cc28783ab36b7f6d3831e  # DSNP
          - 7a235133c87f7da4c8ccccbe915e60aa  # HBO
          - a880d6abc21e7c16884f3ae393f84179  # HMAX
          - f6cce30f1733d5c8194222a7507f2571  # HULU
          - 0ac24a2a68a9700bcb7eee4e543ff1e0  # iT
          - d34870697c9db575f17700212167be23  # NF
          - 1656adc6d7bb2c8cca6acfb6592db421  # PCOK
          - c67a75ae4a1715f2bb4d492f17f363f4  # PMTP
          - ae58039e1319178e6be73571571d894e  # SHO
        assign_scores_to:
          - name: WEB-2160p

      # HDR formats (prioritize)
      - trash_ids:
          - 7878c33f1b19f82f2cb161e9f29d1eeb  # DV HDR10+
          - 6d0d8de7b57e35518ac0308b0ddf404e  # DV HDR10
          - 1f733af03141f068a540eec352589a89  # DV HLG
          - 27954b564a9a9de60b1be9e1a91f84e6  # DV SDR
          - a3d82bf40e51450f4712b0880c068131  # HDR10+
          - 3497799d29a085e2ac2df9d468413c94  # HDR10
          - 3e2c4e748b64a1a1118e0ea3f4cf6875  # HDR
          - bb019e1cd00f304f80971c3b2d4f1fd3  # HDR (undefined)
          - 2a4d9069cc1fe3ce39cf80a4497ce4e1  # HLG
        assign_scores_to:
          - name: WEB-2160p

      # Unwanted
      - trash_ids:
          - 85c61753df5da1fb2aab6f2a47426b09  # BR-DISK
          - 9c11cd3f07101cdba90a2d81cf0e56b4  # LQ
          - fbcb31d8f2bd3d588b4b69d3c6bf17a1  # 3D
        assign_scores_to:
          - name: WEB-2160p
            score: -10000

radarr:
  movies:
    base_url: http://radarr:7878
    api_key: YOUR_RADARR_API_KEY

    quality_definition:
      type: movie

    quality_profiles:
      - name: UHD Bluray + WEB
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: Bluray-2160p
          until_score: 10000
        min_format_score: 0
        quality_sort: top
        qualities:
          - name: Bluray-2160p
          - name: WEB 2160p
            qualities:
              - WEBDL-2160p
              - WEBRip-2160p
          - name: Bluray-1080p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
